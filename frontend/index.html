<!DOCTYPE html>
<html class="dark" lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Twin AI</title>
    <meta name="description" content="Health Twin AI — your personalized digital health twin powered by AI. Track metrics, simulate futures, and catch health trends before they become problems." />

    <!-- Stitch CDN Tailwind + plugins -->

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>

    <!-- Stitch Design Tokens -->

          extend: {

              "secondary": "#ddc1ac",

              "primary-fixed-dim": "#d7c3b0",

              "xl": "48px",
              "gutter": "16px",
              "container-margin": "20px"

            fontFamily: {

    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .glass-panel { background: rgba(246,225,205,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(77,69,62,0.4); }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #17130f; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #4d453e; border-radius: 10px; }
    </style>

  <body class="bg-background text-on-background font-body-md custom-scrollbar">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
